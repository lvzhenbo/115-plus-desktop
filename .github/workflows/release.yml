name: "Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release type or explicit version (e.g. patch, minor, major, 1.2.3)"
        required: true
        default: "patch"
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-it.outputs.version }}
      changelog: ${{ steps.release-it.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Run release-it
        id: release-it
        run: |
          pnpm release --ci ${{ inputs.version }}
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          CHANGELOG=$(awk '/^## \[/{if(c++) exit}c' CHANGELOG.md)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: bump
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            aria2_triple: "aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            aria2_triple: "x86_64-apple-darwin"
          - platform: "ubuntu-latest"
            args: ""
            aria2_triple: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            aria2_triple: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install

      # ========= Compile aria2 from source =========

      - name: Install aria2 build dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get install -y autoconf automake autopoint libtool pkg-config \
            libssl-dev libc-ares-dev zlib1g-dev libssh2-1-dev

      - name: Compile aria2 (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          git clone --depth 1 https://github.com/aria2/aria2.git /tmp/aria2-build
          cd /tmp/aria2-build
          autoreconf -i
          ./configure ARIA2_STATIC=yes \
            --without-gnutls --with-openssl \
            --without-libxml2 --without-expat \
            --without-libgcrypt --disable-nls
          make -j$(nproc)
          strip src/aria2c
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          cp src/aria2c "$GITHUB_WORKSPACE/src-tauri/binaries/aria2c-${{ matrix.aria2_triple }}"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/aria2c-${{ matrix.aria2_triple }}"

      - name: Install aria2 build dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install autoconf automake libtool pkg-config

      - name: Compile aria2 (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          git clone --depth 1 https://github.com/aria2/aria2.git /tmp/aria2-build
          cd /tmp/aria2-build
          autoreconf -i

          ARCH_FLAGS=""
          HOST_FLAG=""
          if [[ "${{ matrix.aria2_triple }}" == "x86_64-apple-darwin" ]]; then
            ARCH_FLAGS="-arch x86_64"
            HOST_FLAG="--host=x86_64-apple-darwin --build=aarch64-apple-darwin"
          fi

          ./configure $HOST_FLAG \
            CFLAGS="$ARCH_FLAGS" CXXFLAGS="$ARCH_FLAGS" LDFLAGS="$ARCH_FLAGS" \
            --without-gnutls --without-openssl --with-appletls \
            --without-libxml2 --without-expat \
            --without-libgcrypt --disable-nls
          make -j$(sysctl -n hw.ncpu)
          strip src/aria2c
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          cp src/aria2c "$GITHUB_WORKSPACE/src-tauri/binaries/aria2c-${{ matrix.aria2_triple }}"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/aria2c-${{ matrix.aria2_triple }}"

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-c-ares
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-zlib
            autoconf
            automake
            libtool
            pkg-config
            make
            git

      - name: Compile aria2 (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/aria2/aria2.git /tmp/aria2-build
          cd /tmp/aria2-build
          autoreconf -i
          ./configure ARIA2_STATIC=yes \
            --without-gnutls --with-openssl \
            --without-libxml2 --with-expat \
            --with-libcares --without-libgcrypt --disable-nls
          make -j$(nproc)
          strip src/aria2c.exe
          WORKSPACE=$(cygpath "$GITHUB_WORKSPACE")
          mkdir -p "$WORKSPACE/src-tauri/binaries"
          cp src/aria2c.exe "$WORKSPACE/src-tauri/binaries/aria2c-${{ matrix.aria2_triple }}.exe"

      # ========= Build Tauri App =========

      - name: Create .env.local file
        run: |
          if [ -f .env ]; then
            cp .env .env.local
          else
            touch .env.local
          fi
          echo "VITE_APP_ID=${{ secrets.APP_ID }}" >> .env.local
          echo "VITE_APP_KEY=${{ secrets.APP_KEY }}" >> .env.local
        shell: bash

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "115+ v__VERSION__"
          releaseBody: ${{ needs.bump.outputs.changelog }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
